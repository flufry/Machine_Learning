# EWC-LoRA (ICLR 2026) — CIFAR-100 10×10，与论文代码 low-rank-cl/configs/ewclora/cifar100.json 对齐：
#   epochs=20, batch_size=128, rank=10, lrate=5e-4, fc_lrate=5e-3, wd=0, Adam(0.9,0.999),
#   gamma=1, lambda=1e7, num_workers=16, shuffle=false, seed=0, load=vit_base_patch16_224_in21k（本仓库 timm 映射为 .orig_in21k）
# 学习率调度：官方 methods/base.py 使用 CosineAnnealingLR(T_max=epochs, eta_min=0)，不用 LibContinual 默认的 CosineSchedule 公式。
# 验证：官方训练循环内不做 test 集验证，仅 epoch 末 scheduler.step；LibContinual 对 EWCLoRA 也关闭 in-epoch validation（见 core/trainer.py）。
# Requires: timm ViT-B/16 IN-21K weights, image_size 224.
# CIFAR-100 图片版（train/类名/图、test/类名/图）: dataset: cifar100，data_root 指向含 train、test 的父目录。
# 官网 pickle 版: dataset: binary_cifar100（见 core/data/dataset.py）。
# End of training logs paper Sec 4.1 metrics. Plasticity (Eq. 6): either set compute_plasticity_reference: true
# (runs T isolated single-task trainings after CL; slow, needs extra GPU memory) or paste plasticity_reference_acc: [T floats in %].
# log_paper_cl_metrics: true enables the same block for non-EWCLoRA methods when using plasticity_reference_acc.

compute_plasticity_reference: false
# plasticity_reference_acc: [98.0, 97.0, 96.0, 95.0, 94.0, 93.0, 92.0, 91.0, 90.0, 89.0]

save_path: ./
dataset: cifar100
data_root: ./cifar100
image_size: 224
init_cls_num: 10
inc_cls_num: 10
task_num: 10

epoch: 20
val_per_epoch: 1
# 覆盖 headers/test.yaml 默认 10；与官方每 task 测一次一致，并避免重复打印相同指标
testing_times: 1
n_gpu: 1
seed: 0
shuffle: false
batch_size: 128
num_workers: 16
pin_memory: false

optimizer:
  name: Adam
  kwargs:
    lr: 0.0005
    weight_decay: 0.0
    betas: [0.9, 0.999]

lr_scheduler:
  name: CosineAnnealingLR
  kwargs:
    T_max: 20
    eta_min: 0.0

backbone:
  name: SiNet_vit_ewclora
  kwargs:
    total_sessions: 10
    rank: 10
    init_cls: 10
    embd_dim: 768
    # timm>=1.0: use .orig_in21k; legacy name vit_base_patch16_224_in21k is auto-aliased in code
    load: vit_base_patch16_224.orig_in21k

buffer:
  name: LinearBuffer
  kwargs:
    buffer_size: 0
    batch_size: 128
    strategy: herding

classifier:
  name: EWCLoRA
  kwargs:
    feat_dim: 768
    num_class: 100
    init_cls_num: 10
    inc_cls_num: 10
    total_sessions: 10
    gamma: 1.0
    lambda_ewc: 10000000.0
    encoder_lr: 0.0005
    fc_lr: 0.005
    weight_decay: 0.0
