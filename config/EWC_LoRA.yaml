# EWC-LoRA (ICLR 2026) — CIFAR-100 10×10, aligned with low-rank-cl configs/ewclora/cifar100.json
# Requires: timm ViT-B/16 IN-21K weights, image_size 224.
# CIFAR-100 图片版（train/类名/图、test/类名/图）: dataset: cifar100，data_root 指向含 train、test 的父目录。
# 官网 pickle 版: dataset: binary_cifar100（见 core/data/dataset.py）。
# End of training logs paper Sec 4.1 metrics. Plasticity (Eq. 6): either set compute_plasticity_reference: true
# (runs T isolated single-task trainings after CL; slow, needs extra GPU memory) or paste plasticity_reference_acc: [T floats in %].
# log_paper_cl_metrics: true enables the same block for non-EWCLoRA methods when using plasticity_reference_acc.

compute_plasticity_reference: false
# plasticity_reference_acc: [98.0, 97.0, 96.0, 95.0, 94.0, 93.0, 92.0, 91.0, 90.0, 89.0]

save_path: ./
dataset: cifar100
data_root: ./cifar100
image_size: 224
init_cls_num: 10
inc_cls_num: 10
task_num: 10

epoch: 20
val_per_epoch: 1
n_gpu: 1
seed: 0
shuffle: false
batch_size: 128
num_workers: 8
pin_memory: false

optimizer:
  name: Adam
  kwargs:
    lr: 0.0005
    weight_decay: 0.0
    betas: [0.9, 0.999]

lr_scheduler:
  name: CosineSchedule
  kwargs:
    K: 20

backbone:
  name: SiNet_vit_ewclora
  kwargs:
    total_sessions: 10
    rank: 10
    init_cls: 10
    embd_dim: 768
    load: vit_base_patch16_224_in21k

buffer:
  name: LinearBuffer
  kwargs:
    buffer_size: 0
    batch_size: 128
    strategy: herding

classifier:
  name: EWCLoRA
  kwargs:
    feat_dim: 768
    num_class: 100
    init_cls_num: 10
    inc_cls_num: 10
    total_sessions: 10
    gamma: 1.0
    lambda_ewc: 10000000.0
    encoder_lr: 0.0005
    fc_lr: 0.005
    weight_decay: 0.0
